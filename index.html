<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Reparto</title>
  <style>
    :root {
      --bg-main: #121212;
      --bg-card: #1e1e1e;
      --bg-hover: #2a2a2a;
      --text-main: #e0e0e0;
      --text-muted: #a0a0a0;
      --accent: #00adb5;
      --success: #2ecc71;
      --warning: #f1c40f;
      --danger: #e74c3c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); padding-bottom: 60px; }

    /* Barra Superior */
    header {
      background-color: var(--bg-card);
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.4rem; color: var(--accent); }
    header p { font-size: 0.9rem; color: var(--text-muted); }

    /* Barra de herramientas */
    .toolbar {
      background-color: #1a1a1a;
      padding: 10px 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      background-color: var(--bg-card);
      color: var(--text-main);
      border: 1px solid #333;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn:active { background-color: var(--bg-hover); }
    .btn-primary { background-color: var(--accent); color: #fff; border: none; }
    .btn-primary:active { opacity: 0.9; }

    /* Contenedor Principal */
    .container { padding: 15px; max-width: 800px; margin: 0 auto; }

    /* Tarjetas de Clientes */
    .card {
      background-color: var(--bg-card);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 12px;
      border-left: 5px solid #444;
      transition: all 0.2s ease;
    }
    .card.done { border-left-color: var(--success); opacity: 0.6; }
    .card.issue { border-left-color: var(--danger); }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .card-title { font-size: 1.1rem; font-weight: bold; color: #fff; }
    .card-route { background-color: #333; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; color: var(--accent); }
    .card-dir { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; }

    /* Bloque de Notas del Cliente */
    .card-notes-area { margin-bottom: 12px; }
    .notes-input {
      width: 100%;
      background-color: #252525;
      border: 1px solid #444;
      color: #fff;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.9rem;
      resize: none;
    }

    /* Acciones de la Tarjeta */
    .card-actions { display: flex; gap: 8px; }
    .card-actions .btn { flex: 1; justify-content: center; padding: 8px; font-size: 0.85rem; }

    /* MODO COMPACTO (Corregido y optimizado) */
    body.compact-mode .card { padding: 8px 12px; margin-bottom: 6px; }
    body.compact-mode .card-title { font-size: 0.95rem; }
    body.compact-mode .card-dir { font-size: 0.8rem; margin-bottom: 6px; }
    body.compact-mode .notes-input { padding: 4px 6px; font-size: 0.8rem; }
    body.compact-mode .card-actions .btn { padding: 5px; font-size: 0.75rem; }

    /* Modales y Overlays */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
      z-index: 200; padding: 20px;
    }
    .hidden { display: none !important; }
    .modal {
      background-color: var(--bg-card); width: 100%; max-width: 500px;
      border-radius: 8px; border: 1px solid #444; padding: 20px;
    }
    .modal h2 { margin-bottom: 15px; color: var(--accent); font-size: 1.3rem; }
    .modal input[type="text"] {
      width: 100%; background-color: #252525; border: 1px solid #444;
      color: #fff; padding: 12px; border-radius: 6px; font-size: 1rem; margin-bottom: 15px;
    }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }

    /* Área de Resumen */
    #res-body {
      width: 100%; height: 250px; background-color: #121212; color: #67e8f9;
      font-family: monospace; padding: 10px; border-radius: 4px;
      overflow-y: auto; white-space: pre-wrap; font-size: 0.85rem; margin-bottom: 15px;
      border: 1px solid #333;
    }

    /* Avisos de Estado */
    .status-msg { display: none; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; text-align: center; }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>🚚 En Ruta</h1>
      <p id="hdr-date">Cargando fecha...</p>
    </div>
    <div>
      <span id="counter" style="font-weight: bold; color: var(--accent);">0 / 0</span>
    </div>
  </header>

  <div class="toolbar">
    <button class="btn" onclick="openCfg()">⚙️ Configurar</button>
    <!-- BOTÓN DE VISTA COMPACTA / NORMAL -->
    <button class="btn" id="btn-toggle-view" onclick="toggleViewMode()">🔎 Vista Compacta</button>
    <button class="btn" onclick="openResumen()">📋 Ver Resumen</button>
    <button class="btn" style="margin-left: auto; background-color: #222;" onclick="resetApp()">🔄 Limpiar</button>
  </div>

  <div class="container" id="lista-clientes">
    <!-- Las tarjetas se generan dinámicamente aquí -->
  </div>

  <!-- CONFIGURACIÓN MODAL -->
  <div id="cfg-overlay" class="overlay hidden">
    <div class="modal">
      <h2>Configuración de Datos</h2>
      <div id="cfg-status" class="status-msg"></div>
      <input type="text" id="url-input" placeholder="Pega la URL de Google Sheets o WebApp">
      <div class="modal-buttons">
        <button class="btn" onclick="loadDemo()" style="margin-right: auto; background-color: #2c3e50;">Cargar Demo</button>
        <button class="btn" onclick="closeCfg()">Cancelar</button>
        <button class="btn btn-primary" onclick="cargarDesdeURL()">Guardar y Cargar</button>
      </div>
    </div>
  </div>

  <!-- RESUMEN MODAL -->
  <div id="res-overlay" class="overlay hidden">
    <div class="modal" style="max-width: 600px;">
      <h2>Resumen de Trabajo Diario</h2>
      <pre id="res-body"></pre>
      <div class="modal-buttons">
        <button class="btn" onclick="compartirResumen()" style="background-color: var(--success); color: #fff;">📋 Copiar al Portapapeles</button>
        <button class="btn" onclick="closeResumen()">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    let pending = [];
    let completed = [];

    // FUNCIÓN PARA CAMBIAR ENTRE VISTA COMPACTA Y NORMAL
    function toggleViewMode() {
      const body = document.body;
      const btn = document.getElementById("btn-toggle-view");
      
      body.classList.toggle("compact-mode");
      
      if (body.classList.contains("compact-mode")) {
        btn.textContent = "📱 Vista Normal";
        localStorage.setItem("view_mode", "compact");
      } else {
        btn.textContent = "🔎 Vista Compacta";
        localStorage.setItem("view_mode", "normal");
      }
    }

    function openCfg() {
      document.getElementById("cfg-overlay").classList.remove("hidden");
      try {
        const savedUrl = localStorage.getItem("reparto_url");
        if (savedUrl) document.getElementById("url-input").value = savedUrl;
      } catch(e) {}
    }
    function closeCfg() { document.getElementById("cfg-overlay").classList.add("hidden"); }

    function save() {
      try {
        localStorage.setItem("reparto_pending", JSON.stringify(pending));
        localStorage.setItem("reparto_completed", JSON.stringify(completed));
      } catch(e) {}
    }

    function loadSaved() {
      try {
        const p = localStorage.getItem("reparto_pending");
        const c = localStorage.getItem("reparto_completed");
        const v = localStorage.getItem("view_mode");
        
        if (p) pending = JSON.parse(p);
        if (c) completed = JSON.parse(c);
        
        // Recordar la preferencia de vista guardada
        if (v === "compact") {
          document.body.classList.add("compact-mode");
          document.getElementById("btn-toggle-view").textContent = "📱 Vista Normal";
        }
      } catch(e) {}
    }

    function render() {
      const container = document.getElementById("lista-clientes");
      container.innerHTML = "";

      const total = pending.length + completed.length;
      document.getElementById("counter").textContent = `${completed.length} / ${total}`;

      if (pending.length === 0 && completed.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted);">
          <p>No hay datos cargados en la aplicación.</p>
          <p style="font-size:0.9rem; margin-top:10px;">Usa el botón de <b>⚙️ Configurar</b> arriba para empezar.</p>
        </div>`;
        return;
      }

      // 1. Renderizar Clientes Pendientes (Ordenados por su campo orden de reparto)
      pending.sort((a,b) => (parseInt(a.orden) || 99) - (parseInt(b.orden) || 99));
      pending.forEach((c, idx) => {
        container.appendChild(createCard(c, idx, false));
      });

      // 2. Renderizar Clientes Ya Gestionados al final
      completed.forEach((c, idx) => {
        container.appendChild(createCard(c, idx, true));
      });
    }

    function createCard(c, idx, isCompleted) {
      const card = document.createElement("div");
      card.className = "card";
      if (isCompleted) {
        card.classList.add(c.status); // 'done' o 'issue'
      }

      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-title">${c.nombre}</div>
            <div style="font-size:0.8rem; color:var(--text-muted); margin-top:2px;">Código: ${c.codigo}</div>
          </div>
          <span class="card-route">Ruta ${c.ruta || 'S/R'}</span>
        </div>
        <div class="card-dir">${c.direccion}</div>
        <div class="card-notes-area">
          <input type="text" class="notes-input" placeholder="Añadir observaciones o incidencias..." 
            value="${c.notes || ''}" onchange="updateNote(${isCompleted}, ${idx}, this.value)">
        </div>
        <div class="card-actions">
          ${!isCompleted ? `
            <button class="btn" style="background-color:#1e3d2f; color:#2ecc71; border-color:#27ae60;" onclick="marcarEntrega(${idx}, 'done')">✅ Entregado</button>
            <button class="btn" style="background-color:#3d1e1e; color:#e74c3c; border-color:#c0392b;" onclick="marcarEntrega(${idx}, 'issue')">⚠️ Incidencia</button>
          ` : `
            <button class="btn" style="background-color:#333;" onclick="deshacerEntrega(${idx})">🔄 Deshacer</button>
          `}
        </div>
      `;
      return card;
    }

    function updateNote(isCompleted, idx, val) {
      if (isCompleted) {
        completed[idx].notes = val;
      } else {
        pending[idx].notes = val;
      }
      save();
    }

    function marcarEntrega(idx, status) {
      let item = pending.splice(idx, 1)[0];
      item.status = status;
      completed.push(item);
      save();
      render();
    }

    function deshacerEntrega(idx) {
      let item = completed.splice(idx, 1)[0];
      delete item.status;
      pending.push(item);
      save();
      render();
    }

    function resetApp() {
      if (confirm("¿Estás seguro de que deseas borrar los datos del día? Perderás el progreso.")) {
        pending = [];
        completed = [];
        save();
        render();
      }
    }

    function loadDemo() {
      pending = [
        {codigo:"104432",nombre:"PANADERIA CENTRAL GETAFE",    direccion:"Av. de España, 14, 28903 Getafe, Madrid",            ruta:"186",orden:1,notes:""},
        {codigo:"205519",nombre:"CAFETERIA PLAZA VICTORIA",  direccion:"Plaza de la Constitución, 4, 28901 Getafe, Madrid",  ruta:"186",orden:2,notes:""},
        {codigo:"309941",nombre:"SUPERMERCADO EL HORNO",     direccion:"C. de Toledo, 8, 28901 Getafe, Madrid",              ruta:"186",orden:3,notes:""},
        {codigo:"513378",nombre:"LAS DELICIAS DE ROSSE",     direccion:"C. Pizarro, 1, 28902 Getafe, Madrid",                ruta:"186",orden:4,notes:""}
      ];
      completed = [];
      save();
      closeCfg();
      render();
    }

    function cargarDesdeURL() {
      const urlInput = document.getElementById("url-input");
      const url = urlInput.value.trim();
      if (!url) return;
      
      const status = document.getElementById("cfg-status");
      status.style.display = "block";
      status.textContent = "⏳ Conectando con origen de datos...";
      
      try {
        localStorage.setItem("reparto_url", url);
      } catch(e) {}

      // Lógica de fallback para navegadores/radios antiguos
      if (typeof fetch === "undefined") {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              procesarDatos(JSON.parse(xhr.responseText));
            } else {
              status.textContent = "❌ Error en XMLHttpRequest. Revisa la URL.";
            }
          }
        };
        xhr.send();
      } else {
        fetch(url)
          .then(res => res.json())
          .then(data => procesarDatos(data))
          .catch(err => {
            status.textContent = "❌ Error de conexión de red.";
          });
      }
    }

    function procesarDatos(data) {
      const status = document.getElementById("cfg-status");
      if (data && data.length) {
        // Filtrado estricto por la regla de negocio de la 'x'
        pending = data.filter(c => c.obs && c.obs.toLowerCase() === 'x').map(c => ({
          codigo: c.codigo || "",
          nombre: c.nombre || "",
          direccion: c.direccion || "",
          ruta: c.ruta || "",
          orden: parseInt(c.orden) || 99,
          notes: ""
        }));
        completed = [];
        save();
        closeCfg();
        render();
      } else {
        status.textContent = "⚠️ Formato inválido o sin clientes asignados.";
      }
    }

    function openResumen() {
      const body = document.getElementById("res-body");
      if (!completed.length) {
        body.textContent = "No hay repartos gestionados en el día de hoy.";
        document.getElementById("res-overlay").classList.remove("hidden");
        return;
      }

      let txt = `RESUMEN DE REPARTO - ${new Date().toLocaleDateString()}\n`;
      txt += `========================================\n\n`;
      
      const entregados = completed.filter(c => c.status === "done");
      const incidencias = completed.filter(c => c.status === "issue");

      txt += `✅ ENTREGADOS (${entregados.length}):\n`;
      if (entregados.length) {
        entregados.forEach(c => {
          txt += `- [Cód. ${c.codigo}] ${c.nombre} (Ruta ${c.ruta})${c.notes ? `\n  Nota: ${c.notes}` : ''}\n`;
        });
      } else { txt += `- Ninguno\n`; }

      txt += `\n⚠️ INCIDENCIAS (${incidencias.length}):\n`;
      if (incidencias.length) {
        incidencias.forEach(c => {
          txt += `- [Cód. ${c.codigo}] ${c.nombre} (Ruta ${c.ruta})${c.notes ? `\n  Motivo: ${c.notes}` : ''}\n`;
        });
      } else { txt += `- Ninguna\n`; }

      body.textContent = txt;
      document.getElementById("res-overlay").classList.remove("hidden");
    }

    function closeResumen() { document.getElementById("res-overlay").classList.add("hidden"); }

    function compartirResumen() {
      const body = document.getElementById("res-body").textContent;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(body)
          .then(() => alert("📋 ¡Resumen copiado! Listo para pegar en WhatsApp."))
          .catch(() => alert("Por favor, selecciona y copia el texto manualmente."));
      } else {
        alert("Copia el texto directamente de la pantalla.");
      }
    }

    window.onload = function() {
      const d = new Date();
      const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById("hdr-date").textContent = d.toLocaleDateString('es-ES', opciones);
      
      loadSaved();
      render();
    };
  </script>
</body>
</html>
