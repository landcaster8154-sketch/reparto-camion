<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Rutas de Reparto</title>
<style>
  :root {
    --bg:        #0f1117;
    --bg2:       #181c27;
    --card:      #1e2235;
    --card2:     #252a3d;
    --border:    #2e3450;
    --border2:   #3d4466;
    --text:      #eef0f8;
    --text2:     #9ba3c4;
    --text3:     #5a6080;
    --accent:    #4f7fff;
    --accent-bg: rgba(79,127,255,0.15);
    --accent-t:  #7da4ff;
    --green:     #22c55e;
    --green-bg:  rgba(34,197,94,0.15);
    --green-t:   #4ade80;
    --red:       #ef4444;
    --red-bg:    rgba(239,68,68,0.15);
    --red-t:     #f87171;
    --yellow:    #f59e0b;
    --yellow-bg: rgba(245,158,11,0.13);
    --yellow-t:  #fbbf24;
    --ruta-a:    #6366f1;
    --radius:    14px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* HEADER */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
  .header p  { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .hdr-btns  { display: flex; gap: 8px; flex-wrap: wrap; }
  .icon-btn  { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 14px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .icon-btn:hover  { background: var(--card2); color: var(--text); }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stat { text-align: center; padding: 12px 4px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-n { font-size: 34px; font-weight: 800; line-height: 1; }
  .stat-n.blue  { color: var(--accent-t); }
  .stat-n.green { color: var(--green-t); }
  .stat-n.red   { color: var(--red-t); }
  .stat-l { font-size: 12px; color: var(--text3); margin-top: 4px; font-weight: 500; text-transform: uppercase; }

  /* PROGRESS */
  .prog-wrap { height: 3px; background: var(--border); flex-shrink: 0; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width 0.5s ease; }

  /* RUTA BAR */
  .ruta-bar { display: flex; align-items: center; gap: 12px; padding: 10px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; }
  .ruta-label { font-size: 13px; color: var(--text3); font-weight: 600; text-transform: uppercase; white-space: nowrap; }
  .ruta-pill { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .ruta-pill.active { color: #fff; background: var(--accent); border-color: var(--accent); }

  /* SCROLL CONTAINER */
  .scroll { flex: 1; overflow-y: auto; padding: 16px 20px 30px; }
  .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .cards-grid.compact { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cards-grid.compact .card-addr { display: none; }
  .card.expanded { grid-column: 1 / -1; }

  /* NEXT STOP BOX */
  .next-stop { grid-column: 1 / -1; background: var(--accent-bg); border: 1px solid rgba(79,127,255,0.3); border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 12px; font-size: 14px; color: var(--accent-t); font-weight: 600; display: flex; align-items: center; gap: 10px; }

  /* SECTIONS FOR OVERLAYS/HISTORIAL */
  .section-title { font-size: 14px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 8px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* CARDS */
  .card { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); position: relative; background: var(--card); display: flex; flex-direction: column; }
  .card::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background: var(--ruta-a); }
  .card.done-card::before { background: var(--green); }
  .card.issue-card::before { background: var(--red); }
  
  .card-head { padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; }
  .card-order { display: inline-flex; align-items: center; justify-content: center; min-width: 26px; height: 26px; border-radius: 50%; font-size: 12px; font-weight: 800; margin-right: 8px; background: rgba(79,127,255,0.2); color: #7da4ff; }
  .card.done-card .card-order { background: rgba(34,197,94,0.2); color: var(--green-t); }
  .card.issue-card .card-order { background: rgba(239,68,68,0.2); color: var(--red-t); }
  
  .card-name { font-size: 15px; font-weight: 700; }
  .card-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .card-addr { font-size: 13px; color: var(--text2); padding: 0 16px 14px; }
  .chevron { font-size: 13px; color: var(--text3); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* EXPANDED ACTIONS */
  .card-body { border-top: 1px solid var(--border); padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; background: var(--card2); }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { flex: 1; min-width: 80px; padding: 12px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--card); font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .btn.green { border-color: rgba(34,197,94,0.4); background: var(--green-bg); color: var(--green-t); }
  .btn.red   { border-color: rgba(239,68,68,0.4);  background: var(--red-bg);   color: var(--red-t); }
  .btn.blue  { border-color: rgba(79,127,255,0.4); background: var(--accent-bg); color: var(--accent-t); }

  /* OVERLAYS */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .overlay.hidden { display: none; }
  .sheet { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); width: 100%; max-width: 620px; padding: 28px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .sheet h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .field-input { width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 16px; }
  .sheet-btn  { padding: 13px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--card); font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  .sheet-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .sheet-btn.whatsapp { background: #25d366; color: white; border-color: #25d366; }
  .sheet-btn.email { background: #ea4335; color: white; border-color: #ea4335; }
  
  /* SUMMARY CSS */
  .resumen-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
  .resumen-row:last-child { border-bottom: none; }

  /* RUTA FINALIZADA CARD */
  .end-route-card { grid-column: 1 / -1; text-align: center; background: var(--bg2); border: 2px dashed var(--green); border-radius: var(--radius); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .end-check { font-size: 70px; line-height: 1; color: var(--green-t); margin-bottom: 8px; text-shadow: 0 0 20px rgba(34,197,94,0.3); }
  .end-route-card h3 { font-size: 24px; font-weight: 800; color: #fff; }
  .end-route-card p { font-size: 15px; color: var(--text2); max-width: 400px; line-height: 1.5; }
  
  /* ANIMATION */
  @keyframes popIn {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  
  /* DEBUG BOX */
  .debug-box { background: #2c1a1a; border: 1px solid #7a2a2a; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: #ff9999; max-height: 200px; overflow: auto; display: none; white-space: pre; }
  #cfg-status { text-align:center; padding:4px; font-size:14px; color:var(--text2); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <h1>🚚 Mis Rutas de Reparto</h1>
      <p id="hdr-date"></p>
    </div>
    <div class="hdr-btns">
      <button class="icon-btn" onclick="toggleView()">👁️ Vista</button>
      <button class="icon-btn" onclick="openHistorial()">📋 Historial</button>
      <button class="icon-btn" onclick="openResumen()">📊 Resumen</button>
      <button class="icon-btn" onclick="openConfig()">📂 Sincronizar</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n blue"   id="s-pend">0</div><div class="stat-l">Pendientes</div></div>
    <div class="stat"><div class="stat-n green" id="s-done">0</div><div class="stat-l">Entregados</div></div>
    <div class="stat"><div class="stat-n red"   id="s-issue">0</div><div class="stat-l">Incidencias</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <!-- BARRA DE RUTAS -->
  <div class="ruta-bar" id="ruta-bar"></div>

  <div class="scroll">
    <div class="cards-grid" id="pending-list"></div>
  </div>
</div>

<!-- CONFIG OVERLAY (SINCRONIZAR) -->
<div class="overlay hidden" id="cfg-overlay">
  <div class="sheet">
    <h2>📂 Sincronizar Clientes</h2>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <input class="field-input" id="url-input" placeholder="URL de tu Apps Script (terminada en /exec)..." />
      <button class="sheet-btn primary" onclick="cargarDesdeURL()">⬇️ Cargar</button>
    </div>
    <div id="cfg-status"></div>
    <div class="debug-box" id="cfg-debug"></div>
    <div style="text-align:right; margin-top:8px;">
      <button class="sheet-btn" onclick="closeCfg()">Cerrar</button>
    </div>
  </div>
</div>

<!-- RESUMEN OVERLAY -->
<div class="overlay hidden" id="resumen-overlay">
  <div class="sheet">
    <h2>📊 Resumen del Reparto</h2>
    <div id="resumen-content" style="margin: 8px 0;">
      <!-- Se llena dinámicamente -->
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;">
      <button class="sheet-btn whatsapp" onclick="exportarResumen('whatsapp')">💬 WhatsApp</button>
      <button class="sheet-btn" style="background:#0078d4; color:white; border-color:#0078d4;" onclick="exportarResumen('telegram')">✈️ Telegram</button>
      <button class="sheet-btn email" onclick="exportarResumen('email')">✉️ Correo</button>
      <button class="sheet-btn" style="margin-left:auto;" onclick="closeResumen()">Cerrar</button>
    </div>
  </div>
</div>

<!-- HISTORIAL OVERLAY (GESTIONADOS) -->
<div class="overlay hidden" id="historial-overlay">
  <div class="sheet" style="max-width: 700px;">
    <h2>📋 Clientes Gestionados</h2>
    <p style="font-size:13px; color:var(--text3); margin-top:-6px;">Pulsa en cualquier tarjeta para devolverla a la lista de pendientes.</p>
    
    <div id="historial-content" style="overflow-y:auto; max-height:60vh; display:flex; flex-direction:column; gap:8px; margin:10px 0; padding-right:4px;">
      <!-- Se llena dinámicamente -->
    </div>
    
    <div style="text-align:right; margin-top:8px;">
      <button class="sheet-btn primary" onclick="closeHistorial()">Cerrar Historial</button>
    </div>
  </div>
</div>

<script>
let pending = [], completed = [], issues = [], phones = {}, currentRuta = "all", expandedCardId = null, isCompactView = false, expandedHistorialId = null;

function setHeaderDate() {
  document.getElementById("hdr-date").textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
}

function toggleView() {
  isCompactView = !isCompactView;
  document.getElementById('pending-list').classList.toggle('compact', isCompactView);
  render();
}

async function cargarDesdeURL() {
  const url = document.getElementById("url-input").value.trim();
  const status = document.getElementById("cfg-status");
  const debugBox = document.getElementById("cfg-debug");
  
  if (!url) { alert("Pega la URL de Apps Script"); return; }
  
  localStorage.setItem("apps_script_url", url);
  status.textContent = "⏳ Leyendo datos del Sheets... (Filtro OBSERVACIONES = 'X')";
  debugBox.style.display = "none";
  
  try {
    const response = await fetch(url);
    const rawData = await response.json();
    let matriz = Array.isArray(rawData) ? rawData : (rawData.data || rawData.clientes || []);

    if (!matriz || matriz.length < 2) {
      status.innerHTML = "❌ El script devolvió una lista vacía.";
      return;
    }

    const cabecera = matriz[0].map(h => h.toString().toUpperCase().trim());
    
    const idxCodigo    = cabecera.findIndex(h => h.includes("CODIGO") || h === "A");
    const idxNombre    = cabecera.findIndex(h => h.includes("NOMBRE") || h === "B");
    const idxDireccion = cabecera.findIndex(h => h.includes("DIREC") || h === "C");
    const idxRuta      = cabecera.findIndex(h => h === "RUTA" || h === "D");
    const idxOrden     = cabecera.findIndex(h => h.includes("ORDEN") || h === "E");
    const idxObs       = cabecera.findIndex(h => h.includes("OBSER") || h === "F");
    const idxTel       = cabecera.findIndex(h => h.includes("TELEF") || h === "G");
    const idxNota      = cabecera.findIndex(h => h.includes("NOTA") || h === "H");

    let clientesCargados = [];
    phones = {}; completed = []; issues = []; expandedCardId = null;

    for (let i = 1; i < matriz.length; i++) {
      const fila = matriz[i];
      if (!fila || fila.length === 0) continue;

      const obsValor = idxObs !== -1 ? (fila[idxObs] || "").toString().trim().toUpperCase() : "";
      
      if (obsValor === "X") {
        const cod = idxCodigo !== -1 ? fila[idxCodigo].toString().trim() : "S/C";
        const nom = idxNombre !== -1 ? fila[idxNombre].toString().trim() : "Cliente sin nombre";
        const dir = idxDireccion !== -1 ? fila[idxDireccion].toString().trim() : "Sin dirección";
        const rut = idxRuta !== -1 ? fila[idxRuta].toString().trim() : "180";
        const ordRaw = idxOrden !== -1 ? fila[idxOrden] : 99;
        const nota = idxNota !== -1 ? fila[idxNota].toString().trim() : "";
        const tel = idxTel !== -1 ? fila[idxTel].toString().trim() : "";

        if (cod && tel) phones[cod] = tel;

        clientesCargados.push({
          id: cod + "_" + i,
          codigo: cod,
          nombre: nom,
          direccion: dir,
          ruta: rut,
          orden: parseInt(ordRaw) || 99,
          nota_entrega: nota
        });
      }
    }

    if (clientesCargados.length === 0) {
      status.innerHTML = "⚠️ Sincronizado OK, pero ninguna fila tenía la 'X' en observaciones.";
      return;
    }

    pending = clientesCargados.sort((a, b) => a.orden - b.orden);
    status.textContent = `✅ ¡Cargados ${pending.length} clientes con éxito!`;
    setTimeout(closeCfg, 1200);
    renderRutaBar();
    render();
    
  } catch (err) {
    status.textContent = "❌ Error crítico al leer el enlace.";
    debugBox.style.display = "block";
    debugBox.textContent = err.toString();
  }
}

function renderRutaBar() {
  const bar = document.getElementById("ruta-bar");
  if (!pending.length && !completed.length && !issues.length) { bar.innerHTML = ""; return; }

  let todasLasRutas = [...pending, ...completed, ...issues].map(c => c.ruta);
  let rutasUnicas = [...new Set(todasLasRutas)].sort();

  let html = `<span class="ruta-label">Rutas:</span>`;
  html += `<button class="ruta-pill ${currentRuta === 'all' ? 'active' : ''}" onclick="setRuta('all')">Todas</button>`;
  
  rutasUnicas.forEach(r => {
    html += `<button class="ruta-pill ${currentRuta === r ? 'active' : ''}" onclick="setRuta('${r}')">${r}</button>`;
  });
  
  bar.innerHTML = html;
}

function setRuta(r) {
  currentRuta = r;
  expandedCardId = null;
  renderRutaBar();
  render();
}

function toggleCard(id) {
  expandedCardId = (expandedCardId === id) ? null : id;
  render();
}

function marcarEntregado(id, event) {
  if(event) event.stopPropagation();
  let idx = pending.findIndex(c => c.id === id);
  if(idx > -1) { completed.push(pending[idx]); pending.splice(idx, 1); }
  if(expandedCardId === id) expandedCardId = null;
  render();
}

function marcarIncidencia(id, event) {
  if(event) event.stopPropagation();
  let idx = pending.findIndex(c => c.id === id);
  if(idx > -1) { issues.push(pending[idx]); pending.splice(idx, 1); }
  if(expandedCardId === id) expandedCardId = null;
  render();
}

function recuperarCliente(id, deDonde, event) {
  if(event) event.stopPropagation();
  if (deDonde === 'done') {
    let idx = completed.findIndex(c => c.id === id);
    if(idx > -1) { pending.push(completed[idx]); completed.splice(idx, 1); }
  } else {
    let idx = issues.findIndex(c => c.id === id);
    if(idx > -1) { pending.push(issues[idx]); issues.splice(idx, 1); }
  }
  pending.sort((a, b) => a.orden - b.orden);
  render();
  if (document.getElementById("historial-overlay").classList.contains("hidden") === false) {
    renderHistorial();
  }
}

function render() {
  const list = document.getElementById("pending-list");
  
  let filteredPending = pending.filter(c => currentRuta === "all" || c.ruta === currentRuta);
  let filteredDone = completed.filter(c => currentRuta === "all" || c.ruta === currentRuta);
  let filteredIssues = issues.filter(c => currentRuta === "all" || c.ruta === currentRuta);

  document.getElementById("s-pend").textContent = filteredPending.length;
  document.getElementById("s-done").textContent = filteredDone.length;
  document.getElementById("s-issue").textContent = filteredIssues.length;

  const total = filteredPending.length + filteredDone.length + filteredIssues.length;
  document.getElementById("prog").style.width = (total > 0 ? (filteredDone.length / total) * 100 : 0) + "%";
  
  // VERIFICAR RUTA FINALIZADA (Si no hay pendientes, pero hay clientes gestionados en total)
  if (filteredPending.length === 0 && total > 0) {
    list.innerHTML = `
      <div class="end-route-card">
        <div class="end-check">🎉</div>
        <h3>¡Ruta Finalizada con Éxito!</h3>
        <p>Has completado todos los repartos asignados para esta sección. Ya puedes sacar los datos de cierre.</p>
        <button class="sheet-btn primary" style="margin-top: 8px;" onclick="openResumen()">📊 Ver y Enviar Resumen</button>
      </div>
    `;
    return;
  }

  let listHtml = "";

  // MENSAJE INICIAL SI NO HAY NADA DE NADA CARGADO
  if (!total) {
    list.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);">Pulsa 'Sincronizar' arriba para importar la ruta.</div>`;
    return;
  }

  // SIGUIENTE PARADA
  if (!isCompactView && filteredPending.length > 0) {
    const next = filteredPending[0];
    listHtml += `
      <div class="next-stop">
        <span>⚡ SIGUIENTE PARADA:</span> 
        <strong>${next.nombre}</strong> (Orden ${next.orden} · Ruta ${next.ruta})
      </div>
    `;
  }

  // LISTADO DE TARJETAS PENDIENTES
  listHtml += filteredPending.map(c => {
    const isExpanded = expandedCardId === c.id;
    const tel = phones[c.codigo] || "";
    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.direccion)}`;

    return `
      <div class="card ${isExpanded ? 'expanded' : ''}">
        <div class="card-head" onclick="toggleCard('${c.id}')">
          <div style="flex:1; padding-right:8px;">
            <span class="card-order">${c.orden}</span>
            <span class="card-name">${c.nombre}</span>
            <div class="card-meta">Cód. ${c.codigo} · Ruta ${c.ruta}</div>
          </div>
          <div class="chevron ${isExpanded ? 'open' : ''}">▼</div>
        </div>
        
        ${(!isCompactView || isExpanded) ? `<div class="card-addr" onclick="toggleCard('${c.id}')">📍 ${c.direccion}</div>` : ''}
        ${c.nota_entrega && (!isCompactView || isExpanded) ? `<div style="font-size:13px;color:var(--yellow-t);padding:0 16px 10px;">⚠️ Horario: ${c.nota_entrega}</div>` : ''}
        
        ${isExpanded ? `
          <div class="card-body">
            <div class="actions">
              <button class="btn green" onclick="marcarEntregado('${c.id}', event)">✔️ Entregado</button>
              <button class="btn red" onclick="marcarIncidencia('${c.id}', event)">❌ Incidencia</button>
              <a class="btn blue" href="${mapUrl}" target="_blank" onclick="event.stopPropagation()">🗺️ Navegar</a>
              ${tel ? `<a class="btn blue" href="tel:${tel}" onclick="event.stopPropagation()">📞 Llamar</a>` : ''}
            </div>
          </div>
        ` : ''}
      </div>
    `;
  }).join("");

  list.innerHTML = listHtml;
}

/* HISTORIAL EN VENTANA FLOTANTE MODAL */
function openHistorial() {
  renderHistorial();
  document.getElementById("historial-overlay").classList.remove("hidden");
}
function closeHistorial() { 
  document.getElementById("historial-overlay").classList.add("hidden"); 
  expandedHistorialId = null;
}
function toggleHistorialCard(id) {
  expandedHistorialId = (expandedHistorialId === id) ? null : id;
  renderHistorial();
}

function renderHistorial() {
  const content = document.getElementById("historial-content");
  let filteredDone = completed.filter(c => currentRuta === "all" || c.ruta === currentRuta);
  let filteredIssues = issues.filter(c => currentRuta === "all" || c.ruta === currentRuta);

  if (filteredDone.length === 0 && filteredIssues.length === 0) {
    content.innerHTML = `<div style="text-align:center; padding:30px; color:var(--text3);">No hay ningún cliente gestionado todavía en esta ruta.</div>`;
    return;
  }

  let html = "";
  
  if (filteredDone.length > 0) {
    html += `<div class="section-title">✔️ Clientes Entregados (${filteredDone.length})</div>`;
    html += filteredDone.map(c => {
      const isExp = expandedHistorialId === c.id;
      return `
        <div class="card done-card">
          <div class="card-head" onclick="toggleHistorialCard('${c.id}')">
            <div style="flex:1;">
              <span class="card-order">${c.orden}</span>
              <span class="card-name" style="text-decoration:line-through; color:var(--text3);">${c.nombre}</span>
              <div class="card-meta">Entregado · Ruta ${c.ruta}</div>
            </div>
            <div class="chevron ${isExp ? 'open' : ''}">▼</div>
          </div>
          ${isExp ? `
            <div class="card-body">
              <div class="actions">
                <button class="btn" style="color:var(--accent-t);border-color:var(--accent);" onclick="recuperarCliente('${c.id}', 'done', event)">🔄 Reabrir / Mover a Pendientes</button>
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }).join("");
  }

  if (filteredIssues.length > 0) {
    html += `<div class="section-title">❌ Clientes con Incidencia (${filteredIssues.length})</div>`;
    html += filteredIssues.map(c => {
      const isExp = expandedHistorialId === c.id;
      return `
        <div class="card issue-card">
          <div class="card-head" onclick="toggleHistorialCard('${c.id}')">
            <div style="flex:1;">
              <span class="card-order">${c.orden}</span>
              <span class="card-name" style="color:var(--red-t); font-style:italic;">${c.nombre}</span>
              <div class="card-meta">Incidencia · Ruta ${c.ruta}</div>
            </div>
            <div class="chevron ${isExp ? 'open' : ''}">▼</div>
          </div>
          ${isExp ? `
            <div class="card-body">
              <div class="actions">
                <button class="btn" style="color:var(--accent-t);border-color:var(--accent);" onclick="recuperarCliente('${c.id}', 'issue', event)">🔄 Reabrir / Mover a Pendientes</button>
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }).join("");
  }

  content.innerHTML = html;
}

/* FUNCIONES MODAL RESUMEN + EXPORTAR */
function openResumen() {
  const content = document.getElementById("resumen-content");
  const totalOriginal = pending.length + completed.length + issues.length;
  
  content.innerHTML = `
    <div class="resumen-row"><span>Total clientes asignados:</span><strong>${totalOriginal}</strong></div>
    <div class="resumen-row" style="color:var(--accent-t);"><span>Pendientes de visitar:</span><strong>${pending.length}</strong></div>
    <div class="resumen-row" style="color:var(--green-t);"><span>Repartos con éxito:</span><strong>${completed.length}</strong></div>
    <div class="resumen-row" style="color:var(--red-t);"><span>Incidencias registradas:</span><strong>${issues.length}</strong></div>
    <div class="resumen-row" style="margin-top:14px; padding-top:14px; border-top:2px dashed var(--border); font-weight:bold;">
      <span>Efectividad del reparto:</span>
      <span style="color:var(--green-t);">${totalOriginal > 0 ? ((completed.length / totalOriginal) * 100).toFixed(1) : 0}%</span>
    </div>
  `;
  document.getElementById("resumen-overlay").classList.remove("hidden");
}
function closeResumen() { document.getElementById("resumen-overlay").classList.add("hidden"); }

function generarTextoResumen() {
  const totalOriginal = pending.length + completed.length + issues.length;
  const efectividad = totalOriginal > 0 ? ((completed.length / totalOriginal) * 100).toFixed(1) : 0;
  const fechaStr = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'numeric', year: 'numeric' });
  
  let texto = `📋 *RESUMEN DE REPARTO - ${fechaStr}*\n`;
  texto += `--------------------------------------\n`;
  texto += `📦 Total Asignados: ${totalOriginal}\n`;
  texto += `✅ Entregados con Éxito: ${completed.length}\n`;
  texto += `❌ Incidencias: ${issues.length}\n`;
  texto += `⏳ Pendientes: ${pending.length}\n`;
  texto += `📈 Efectividad: ${efectividad}%\n\n`;
  
  if (issues.length > 0) {
    texto += `⚠️ *DETALLE DE INCIDENCIAS:*\n`;
    issues.forEach(c => {
      texto += `- Cód. ${c.codigo}: ${c.nombre} (Ruta ${c.ruta})\n`;
    });
  } else {
    texto += `🎉 ¡Día limpio sin incidencias registrados!`;
  }
  return texto;
}

function exportarResumen(plataforma) {
  const texto = generarTextoResumen();
  
  if (plataforma === 'whatsapp') {
    const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`;
    window.open(url, '_blank');
  } else if (plataforma === 'telegram') {
    const url = `https://t.me/share/url?url=&text=${encodeURIComponent(texto)}`;
    window.open(url, '_blank');
  } else if (plataforma === 'email') {
    const asunto = `Resumen de Reparto - ${new Date().toLocaleDateString('es-ES')}`;
    const textoEmail = texto.replace(/\*/g, ''); 
    const url = `mailto:?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(textoEmail)}`;
    window.open(url, '_blank');
  }
}

function openConfig() { document.getElementById("cfg-overlay").classList.remove("hidden"); }
function closeCfg() { document.getElementById("cfg-overlay").classList.add("hidden"); }

window.onload = function() {
  setHeaderDate();
  const savedUrl = localStorage.getItem("apps_script_url");
  if (savedUrl) {
    document.getElementById("url-input").value = savedUrl;
  }
  render();
};
</script>
