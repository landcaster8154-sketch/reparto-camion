<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Rutas de Reparto</title>
<style>
  :root {
    --bg:        #0f1117;
    --bg2:       #181c27;
    --card:      #1e2235;
    --card2:     #252a3d;
    --border:    #2e3450;
    --border2:   #3d4466;
    --text:      #eef0f8;
    --text2:     #9ba3c4;
    --text3:     #5a6080;
    --accent:    #4f7fff;
    --accent-bg: rgba(79,127,255,0.15);
    --accent-t:  #7da4ff;
    --green:     #22c55e;
    --green-bg:  rgba(34,197,94,0.15);
    --green-t:   #4ade80;
    --red:       #ef4444;
    --red-bg:    rgba(239,68,68,0.15);
    --red-t:     #f87171;
    --yellow:    #f59e0b;
    --yellow-bg: rgba(245,158,11,0.13);
    --yellow-t:  #fbbf24;
    --ruta-a:    #6366f1;
    --radius:    14px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* HEADER */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
  .header p  { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .hdr-btns  { display: flex; gap: 10px; }
  .icon-btn  { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 16px; cursor: pointer; font-size: 15px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
  .icon-btn:hover  { background: var(--card2); color: var(--text); }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stat { text-align: center; padding: 12px 4px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-n { font-size: 34px; font-weight: 800; line-height: 1; }
  .stat-n.blue  { color: var(--accent-t); }
  .stat-n.green { color: var(--green-t); }
  .stat-n.red   { color: var(--red-t); }
  .stat-l { font-size: 12px; color: var(--text3); margin-top: 4px; font-weight: 500; text-transform: uppercase; }

  /* PROGRESS */
  .prog-wrap { height: 3px; background: var(--border); flex-shrink: 0; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width 0.5s ease; }

  /* RUTA BAR */
  .ruta-bar { display: flex; align-items: center; gap: 12px; padding: 10px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; }
  .ruta-label { font-size: 13px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
  .ruta-pill { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; }
  .ruta-pill.active { color: var(--text); border-color: transparent; }

  /* SCROLL */
  .scroll { flex: 1; overflow-y: auto; padding: 16px 20px 30px; }
  .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .cards-grid.compact { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cards-grid.compact .card-addr { display: none; }
  .card.expanded { grid-column: 1 / -1; }

  .next-stop { grid-column: 1 / -1; background: var(--accent-bg); border: 1px solid rgba(79,127,255,0.3); border-radius: var(--radius-sm); padding: 11px 16px; margin-bottom: 2px; font-size: 14px; color: var(--accent-t); font-weight: 600; display: flex; align-items: center; gap: 10px; }

  /* CARDS */
  .card { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); position: relative; background: var(--card); }
  .card::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background: var(--ruta-a); }
  .card.removing { opacity: 0; transform: scale(0.95); max-height: 0; margin: 0; border: none; transition: all 0.3s; }
  .card-head { padding: 14px 16px 0; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; }
  .card-order { display: inline-flex; align-items: center; justify-content: center; min-width: 26px; height: 26px; border-radius: 50%; font-size: 12px; font-weight: 800; margin-right: 8px; background: rgba(79,127,255,0.2); color: #7da4ff; }
  .card-name { font-size: 15px; font-weight: 700; }
  .card-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .card-addr { font-size: 13px; color: var(--text2); padding: 8px 16px 14px; }
  .chevron { font-size: 13px; color: var(--text3); }
  .chevron.open { transform: rotate(180deg); }

  .card-body { border-top: 1px solid var(--border); padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; background: var(--card2); }
  .actions { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 13px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--card); font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; }
  .btn.green { border-color: rgba(34,197,94,0.4); background: var(--green-bg); color: var(--green-t); }
  .btn.red   { border-color: rgba(239,68,68,0.4);  background: var(--red-bg);   color: var(--red-t); }
  .btn.blue  { border-color: rgba(79,127,255,0.4); background: var(--accent-bg); color: var(--accent-t); }

  /* OVERLAYS */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .overlay.hidden { display: none; }
  .sheet { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); width: 100%; max-width: 620px; padding: 28px; max-height: 90vh; overflow-y: auto; }
  .field-input { width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 16px; margin-bottom: 14px; }
  .sheet-btn  { padding: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--card); font-size: 15px; font-weight: 600; color: var(--text2); cursor: pointer; }
  .sheet-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  
  /* DEBUG BOX */
  .debug-box { background: #2c1a1a; border: 1px solid #7a2a2a; border-radius: 8px; padding: 12px; margin-top: 14px; font-family: monospace; font-size: 11px; color: #ff9999; max-height: 200px; overflow: auto; display: none; white-space: pre; }
  #cfg-status { text-align:center; padding:12px; font-size:14px; color:var(--text2); margin-top: 10px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <h1>🚚 Mis Rutas de Reparto</h1>
      <p id="hdr-date"></p>
    </div>
    <div class="hdr-btns">
      <button class="icon-btn" onclick="toggleView()">👁️ Vista</button>
      <button class="icon-btn" onclick="openConfig()">📂 Cargar CSV</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n blue"   id="s-pend">0</div><div class="stat-l">Pendientes</div></div>
    <div class="stat"><div class="stat-n green" id="s-done">0</div><div class="stat-l">Entregados</div></div>
    <div class="stat"><div class="stat-n red"   id="s-issue">0</div><div class="stat-l">Incidencias</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="ruta-bar" id="ruta-bar"></div>

  <div class="scroll">
    <div class="cards-grid" id="pending-list"></div>
  </div>
</div>

<!-- CONFIG OVERLAY -->
<div class="overlay hidden" id="cfg-overlay">
  <div class="sheet">
    <h2>📂 Sincronizar Clientes</h2>
    <div style="margin-top:14px;">
      <div style="display:flex;gap:8px;">
        <input class="field-input" id="url-input" placeholder="URL de tu Apps Script..." style="margin-bottom:0;flex:1;" />
        <button class="sheet-btn primary" onclick="cargarDesdeURL()">⬇️ Cargar</button>
      </div>
    </div>
    <div id="cfg-status"></div>
    <div class="debug-box" id="cfg-debug"></div>
    <div style="margin-top:14px; text-align:right;">
      <button class="sheet-btn" onclick="closeCfg()">Cerrar</button>
    </div>
  </div>
</div>

<script>
let pending = [], completed = [], phones = {}, currentRuta = "all", isCompactView = false;

function setHeaderDate() {
  document.getElementById("hdr-date").textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
}

function toggleView() {
  isCompactView = !isCompactView;
  document.getElementById('pending-list').classList.toggle('compact', isCompactView);
}

async function cargarDesdeURL() {
  const url = document.getElementById("url-input").value.trim();
  const status = document.getElementById("cfg-status");
  const debugBox = document.getElementById("cfg-debug");
  
  if (!url) { alert("Pega la URL"); return; }
  
  status.textContent = "⏳ Leyendo datos del Sheets...";
  debugBox.style.display = "none";
  
  try {
    const response = await fetch(url);
    const rawData = await response.json();
    
    // Si la respuesta no es un array, buscamos dentro de sus propiedades comunes
    let arrayData = Array.isArray(rawData) ? rawData : (rawData.data || rawData.clientes || []);

    if (!arrayData || arrayData.length === 0) {
      status.innerHTML = "❌ El script devolvió una lista vacía.<br>Prueba a ejecutar 'Procesar Ruta' primero en tu PC.";
      return;
    }

    // Muestra una muestra en el cuadro de diagnóstico por si acaso falla el mapeo
    debugBox.style.display = "block";
    debugBox.textContent = "MUESTRA RECIBIDA:\n" + JSON.stringify(arrayData.slice(0, 2), null, 2);

    // ANALIZAR Y CARGAR SIN IMPORTAR EL CASING DE LA 'X'
    let clientesCargados = [];
    
    for (let fila of arrayData) {
      let marcaReparto = false;
      let orden = 99;
      let codigo = "", nombre = "", direccion = "", ruta = "180", nota = "";

      // Buscamos dinámicamente las propiedades del objeto JSON que envía la Macro
      for (let key in fila) {
        const kLow = key.toLowerCase();
        const vRaw = (fila[key] || "").toString().trim();
        const vLow = vRaw.toLowerCase();

        if (kLow.includes("observa") || kLow.includes("obs") || kLow === "f") {
          if (vLow === "x") marcaReparto = true;
        }
        if (kLow.includes("orden") || kLow === "e") {
          orden = parseInt(vRaw.replace(/[^\d]/g, "")) || 99;
          // Salvaguarda: si la X se coló en la columna de orden
          if (vLow.includes("x")) marcaReparto = true;
        }
        if (kLow.includes("codigo") || kLow.includes("cód") || kLow === "a") codigo = vRaw;
        if (kLow.includes("nombre") || kLow === "b") nombre = vRaw;
        if (kLow.includes("direc") || kLow === "c") direccion = vRaw;
        if (kLow.includes("ruta") || kLow === "d") ruta = vRaw;
        if (kLow.includes("nota") || kLow === "h") nota = vRaw;
        if (kLow.includes("telef") || kLow === "g") { if(codigo && vRaw) phones[codigo] = vRaw; }
      }

      // Si tiene la marca o si por alguna razón no se filtró en la macro, la agregamos
      if (marcaReparto) {
        clientesCargados.push({
          codigo: codigo || "S/C",
          nombre: nombre || "Cliente sin nombre",
          direccion: direccion || "Sin dirección",
          ruta: ruta || "180",
          orden: orden,
          nota_entrega: nota
        });
      }
    }

    if (clientesCargados.length === 0) {
      status.innerHTML = "⚠️ Conectado OK, pero ninguna fila tiene la 'X'.<br>Mira abajo la muestra de lo que está enviando tu Sheets 👇";
      return;
    }

    pending = clientesCargados.sort((a,b) => a.orden - b.orden);
    status.textContent = `✅ ¡Cargados ${pending.length} clientes con éxito!`;
    setTimeout(closeCfg, 1200);
    render();
    
  } catch (err) {
    status.textContent = "❌ Error crítico al leer el enlace.";
    debugBox.style.display = "block";
    debugBox.textContent = err.toString();
  }
}

function render() {
  const list = document.getElementById("pending-list");
  document.getElementById("s-pend").textContent = pending.length;
  
  if (!pending.length) {
    list.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);">Pulsa 'Cargar CSV' arriba para sincronizar.</div>`;
    return;
  }

  list.innerHTML = pending.map(c => `
    <div class="card">
      <div class="card-head">
        <div>
          <span class="card-order">${c.orden}</span>
          <span class="card-name">${c.nombre}</span>
          <div class="card-meta">Cód. ${c.codigo} · Ruta ${c.ruta}</div>
        </div>
      </div>
      <div class="card-addr">📍 ${c.direccion}</div>
      ${c.nota_entrega ? `<div style="font-size:13px;color:var(--yellow-t);padding:0 16px 10px;">⚠️ ${c.nota_entrega}</div>` : ''}
    </div>
  `).join("");
}

function openConfig() { document.getElementById("cfg-overlay").classList.remove("hidden"); }
function closeCfg() { document.getElementById("cfg-overlay").classList.add("hidden"); }

window.onload = function() { setHeaderDate(); render(); };
</script>
</body>
</html>
