<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Rutas de Reparto</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #181c27; --card: #1e2235; --card2: #252a3d;
    --border: #2e3450; --border2: #3d4466; --text: #eef0f8; --text2: #9ba3c4;
    --text3: #5a6080; --accent: #4f7fff; --accent-bg: rgba(79,127,255,0.15);
    --accent-t: #7da4ff; --green: #22c55e; --green-bg: rgba(34,197,94,0.15);
    --green-t: #4ade80; --red: #ef4444; --red-bg: rgba(239,68,68,0.15);
    --red-t: #f87171; --yellow: #f59e0b; --yellow-t: #fbbf24;
    --ruta-a: #6366f1; --radius: 14px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 13px; color: var(--text3); }
  .icon-btn { background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 14px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--bg2); border-bottom: 1px solid var(--border); }
  .stat { text-align: center; padding: 12px 4px; border-right: 1px solid var(--border); }
  .stat-n { font-size: 34px; font-weight: 800; line-height: 1; }
  .stat-l { font-size: 12px; color: var(--text3); margin-top: 4px; text-transform: uppercase; }
  .scroll { flex: 1; overflow-y: auto; padding: 16px 20px 30px; }
  .cards-grid { display: grid; gap: 12px; }
  .card { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); background: var(--card); position: relative; }
  .card::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background: var(--ruta-a); }
  .done-card::before { background: var(--green); }
  .issue-card::before { background: var(--red); }
  .card-head { padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; }
  .card-order { min-width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; background: rgba(79,127,255,0.2); color: #7da4ff; }
  .card-body { border-top: 1px solid var(--border); padding: 14px 16px; background: var(--card2); }
  .btn { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--card); color: var(--text2); font-weight: 600; cursor: pointer; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .hidden { display: none; }
  .sheet { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); width: 100%; max-width: 600px; padding: 24px; max-height: 90vh; overflow-y: auto; }
  .section-title { font-size: 14px; font-weight: 700; color: var(--text3); margin: 20px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
  .chevron { transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div><h1>🚚 Rutas</h1><p id="hdr-date"></p></div>
    <div style="display:flex; gap:8px;"><button class="icon-btn" onclick="openHistorial()">📋 Historial</button><button class="icon-btn" onclick="openConfig()">📂 Sinc</button></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" style="color:var(--accent-t)" id="s-pend">0</div><div class="stat-l">Pendientes</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green-t)" id="s-done">0</div><div class="stat-l">Entregados</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red-t)" id="s-issue">0</div><div class="stat-l">Incidencias</div></div>
  </div>
  <div class="scroll"><div class="cards-grid" id="pending-list"></div></div>
</div>

<div id="historial-overlay" class="overlay hidden">
  <div class="sheet">
    <h2>📋 Historial de Gestión</h2>
    <div id="historial-content" style="margin: 15px 0;"></div>
    <button class="btn" onclick="closeHistorial()">Cerrar</button>
  </div>
</div>

<script>
let pending = [], completed = [], issues = [], expandedCardId = null, expandedHistorialId = null;

// Funciones de control
function toggleCard(id) { expandedCardId = (expandedCardId === id) ? null : id; render(); }
function toggleHistorialCard(id) { expandedHistorialId = (expandedHistorialId === id) ? null : id; renderHistorial(); }

function renderHistorial() {
  const content = document.getElementById("historial-content");
  let html = "";
  
  const buildCard = (c, isDone) => {
    const isExp = expandedHistorialId === c.id;
    return `
      <div class="card ${isDone ? 'done-card' : 'issue-card'}" style="margin-bottom: 8px;">
        <div class="card-head" onclick="toggleHistorialCard('${c.id}')" style="min-height: 60px;">
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="card-order">${c.orden}</div>
            <strong>${c.nombre}</strong>
          </div>
          <div class="chevron ${isExp ? 'open' : ''}">▼</div>
        </div>
        ${isExp ? `<div class="card-body"><button class="btn" onclick="recuperar('${c.id}', '${isDone ? 'done' : 'issue'}')">🔄 Reabrir / Mover a Pendientes</button></div>` : ''}
      </div>
    `;
  };

  if (completed.length > 0) {
    html += '<div class="section-title">✔️ Entregados</div>' + completed.map(c => buildCard(c, true)).join("");
  }
  if (issues.length > 0) {
    html += '<div class="section-title">❌ Incidencias</div>' + issues.map(c => buildCard(c, false)).join("");
  }
  content.innerHTML = html || '<p style="color:var(--text3); text-align:center;">Vacío.</p>';
}

function recuperar(id, tipo) {
  let list = tipo === 'done' ? completed : issues;
  let idx = list.findIndex(c => c.id === id);
  if(idx > -1) {
    pending.push(list.splice(idx, 1)[0]);
    pending.sort((a,b) => a.orden - b.orden);
    expandedHistorialId = null;
    render();
    renderHistorial();
  }
}

function render() {
  const list = document.getElementById("pending-list");
  document.getElementById("s-pend").textContent = pending.length;
  document.getElementById("s-done").textContent = completed.length;
  document.getElementById("s-issue").textContent = issues.length;
  
  list.innerHTML = pending.map(c => `
    <div class="card">
      <div class="card-head" onclick="toggleCard('${c.id}')">
        <div style="display:flex; align-items:center; gap:10px;"><div class="card-order">${c.orden}</div> <strong>${c.nombre}</strong></div>
        <div class="chevron ${expandedCardId === c.id ? 'open' : ''}">▼</div>
      </div>
      ${expandedCardId === c.id ? `
        <div class="card-body" style="display:flex; gap:10px;">
          <button class="btn" style="color:var(--green-t)" onclick="marcar('${c.id}', 'done')">✔️ OK</button>
          <button class="btn" style="color:var(--red-t)" onclick="marcar('${c.id}', 'issue')">❌ INC</button>
        </div>` : ''}
    </div>
  `).join("");
}

function marcar(id, tipo) {
  let idx = pending.findIndex(c => c.id === id);
  if(idx > -1) {
    let item = pending.splice(idx, 1)[0];
    tipo === 'done' ? completed.push(item) : issues.push(item);
    expandedCardId = null;
    render();
  }
}

function openHistorial() { renderHistorial(); document.getElementById("historial-overlay").classList.remove("hidden"); }
function closeHistorial() { document.getElementById("historial-overlay").classList.add("hidden"); }
function openConfig() { alert("Función Sincronizar activa"); }
window.onload = () => document.getElementById("hdr-date").textContent = new Date().toLocaleDateString('es-ES');
</script>
</body>
</html>
