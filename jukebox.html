<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ChromeBox Jukebox</title>
<style>
  :root{
    --bg: #0f1115;
    --panel: #1a1d24;
    --panel-2: #23272f;
    --accent: #4dd0e1;
    --accent-2: #ff6b6b;
    --text: #e8e8e8;
    --text-dim: #8a8f98;
    --border: #2c313a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #app {
    display:flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 900px;
    margin: 0 auto;
  }
  header {
    padding: 14px 16px 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 {
    font-size: 18px;
    margin:0;
    letter-spacing: .5px;
  }
  header h1 span { color: var(--accent); }
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    touch-action: manipulation;
  }
  .btn:active { background:#2d323c; }
  .btn.accent { background: var(--accent); color:#08222a; border-color: var(--accent); font-weight:600; }
  .btn.danger { color: var(--accent-2); }

  #nowplaying {
    padding: 18px 16px 10px;
    text-align:center;
    background: linear-gradient(180deg, var(--panel), var(--bg));
  }
  #cover-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 12px;
    border-radius: 14px;
    overflow: hidden;
    background: var(--panel-2);
    border: 1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    touch-action: manipulation;
  }
  #cover-img {
    width:100%; height:100%;
    object-fit: cover;
    display:none;
  }
  #cover-placeholder {
    font-size: 44px;
    color: var(--text-dim);
  }
  #cover-expand {
    position:absolute;
    bottom:6px; right:6px;
    width:32px; height:32px;
    border-radius:50%;
    background: rgba(0,0,0,0.55);
    color:#fff;
    border:none;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    cursor:pointer;
  }
  #np-title { font-size: 17px; font-weight:600; margin:0 0 2px; }
  #np-title.empty { color: var(--text-dim); font-weight:400; }
  #np-sub { font-size: 13px; color: var(--text-dim); margin:0; }

  #fullscreen-cover {
    position: fixed;
    inset: 0;
    background: #000;
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 999;
    flex-direction: column;
  }
  #fullscreen-cover.open { display:flex; }
  #fullscreen-cover img {
    max-width: 92vw;
    max-height: 70vh;
    object-fit: contain;
    border-radius: 10px;
  }
  #fullscreen-cover .fs-placeholder {
    font-size: 120px;
    color: #444;
  }
  #fullscreen-cover .fs-title {
    color: #fff;
    font-size: 16px;
    margin-top: 18px;
    text-align:center;
    padding: 0 20px;
  }
  #fullscreen-cover .fs-sub {
    color: #888;
    font-size: 13px;
    margin-top: 4px;
  }
  #fs-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 42px; height:42px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    color:#fff;
    border:none;
    font-size: 20px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #progress-wrap {
    padding: 6px 16px 0;
  }
  #progress {
    width:100%;
    height: 6px;
    -webkit-appearance:none;
    appearance:none;
    background: var(--panel-2);
    border-radius: 4px;
    outline:none;
  }
  #progress::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:16px; height:16px;
    border-radius:50%;
    background: var(--accent);
    cursor:pointer;
  }
  #times {
    display:flex; justify-content:space-between;
    font-size:11px; color:var(--text-dim);
    padding: 2px 2px 0;
  }

  #controls {
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 18px;
    padding: 14px 16px 18px;
  }
  .ctrl-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 52px; height:52px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 20px;
    cursor:pointer;
    touch-action: manipulation;
  }
  .ctrl-btn:active { background:#2d323c; }
  .ctrl-btn.play {
    width: 66px; height:66px;
    background: var(--accent);
    color:#08222a;
    font-size: 26px;
  }
  .ctrl-btn.toggled { color: var(--accent); border-color: var(--accent); }

  #list-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    font-size: 13px;
    color: var(--text-dim);
  }
  #playlist {
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 20px;
  }
  .track {
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    touch-action: manipulation;
  }
  .track:active { background: var(--panel-2); }
  .track.playing { background: #16323a; }
  .track .idx {
    width: 26px;
    text-align:center;
    color: var(--text-dim);
    font-size: 13px;
    flex-shrink:0;
  }
  .track.playing .idx { color: var(--accent); }
  .track .meta { flex:1; min-width:0; }
  .track .name {
    font-size: 14px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .track.playing .name { color: var(--accent); font-weight:600; }
  .track .remove {
    color: var(--text-dim);
    font-size: 18px;
    padding: 6px 8px;
    flex-shrink:0;
  }

  #empty-state {
    text-align:center;
    padding: 60px 24px;
    color: var(--text-dim);
  }
  #empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  #file-input { display:none; }
  #status-msg {
    text-align:center;
    font-size: 12px;
    color: var(--text-dim);
    padding: 4px 16px;
    min-height: 16px;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <h1>Chrome<span>Box</span> Jukebox</h1>
    <button class="btn accent" id="btn-add">＋ Añadir música</button>
  </header>

  <input type="file" id="file-input" accept="audio/*" multiple>

  <div id="nowplaying">
    <div id="cover-wrap">
      <img id="cover-img" alt="Portada">
      <div id="cover-placeholder">🎵</div>
      <button id="cover-expand" title="Ver a pantalla completa">⛶</button>
    </div>
    <p id="np-title" class="empty">Nada en reproducción</p>
    <p id="np-sub"></p>
  </div>

  <div id="fullscreen-cover">
    <button id="fs-close">✕</button>
    <img id="fs-cover-img" alt="Portada" style="display:none;">
    <div id="fs-cover-placeholder" class="fs-placeholder">🎵</div>
    <div id="fs-title" class="fs-title"></div>
    <div id="fs-sub" class="fs-sub"></div>
  </div>

  <div id="progress-wrap">
    <input type="range" id="progress" min="0" max="100" value="0">
    <div id="times">
      <span id="time-cur">0:00</span>
      <span id="time-dur">0:00</span>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-shuffle" title="Aleatorio">🔀</button>
    <button class="ctrl-btn" id="btn-prev" title="Anterior">⏮</button>
    <button class="ctrl-btn play" id="btn-play" title="Play/Pausa">▶</button>
    <button class="ctrl-btn" id="btn-next" title="Siguiente">⏭</button>
    <button class="ctrl-btn" id="btn-repeat" title="Repetir">🔁</button>
  </div>

  <div id="status-msg"></div>

  <div id="list-header">
    <span id="track-count">0 canciones</span>
    <button class="btn danger" id="btn-clear" style="padding:6px 10px; font-size:12px;">Vaciar todo</button>
  </div>

  <div id="playlist">
    <div id="empty-state">
      <div class="icon">🎵</div>
      <p>Aún no hay música cargada.<br>Pulsa "Añadir música" para elegir canciones<br>desde el pendrive o el almacenamiento del tablet.</p>
    </div>
  </div>

</div>

<audio id="audio-el"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<script>
(function(){
  "use strict";

  // ---------- IndexedDB ----------
  const DB_NAME = "chromebox_jukebox";
  const STORE = "tracks";
  let db = null;

  function openDB(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        const _db = e.target.result;
        if(!_db.objectStoreNames.contains(STORE)){
          _db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
        }
      };
      req.onsuccess = (e) => resolve(e.target.result);
      req.onerror = (e) => reject(e);
    });
  }

  function dbAddTrack(name, blob){
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      const store = tx.objectStore(STORE);
      const req = store.add({ name, blob, addedAt: Date.now() });
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e);
    });
  }

  function dbGetAll(){
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readonly");
      const store = tx.objectStore(STORE);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e);
    });
  }

  function dbDelete(id){
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      const store = tx.objectStore(STORE);
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  function dbUpdateCover(id, coverBlob){
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      const store = tx.objectStore(STORE);
      const getReq = store.get(id);
      getReq.onsuccess = () => {
        const record = getReq.result;
        if(!record){ resolve(); return; }
        record.cover = coverBlob;
        const putReq = store.put(record);
        putReq.onsuccess = () => resolve();
        putReq.onerror = (e) => reject(e);
      };
      getReq.onerror = (e) => reject(e);
    });
  }

  function dbClear(){
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readwrite");
      const store = tx.objectStore(STORE);
      const req = store.clear();
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e);
    });
  }

  // ---------- State ----------
  let tracks = [];       // { id, name, blob, url }
  let currentIndex = -1;
  let isPlaying = false;
  let isShuffle = false;
  let repeatMode = 0;    // 0 = off, 1 = repeat all, 2 = repeat one
  let playOrder = [];    // shuffled indices

  // ---------- Elements ----------
  const audioEl = document.getElementById("audio-el");
  const fileInput = document.getElementById("file-input");
  const btnAdd = document.getElementById("btn-add");
  const btnPlay = document.getElementById("btn-play");
  const btnPrev = document.getElementById("btn-prev");
  const btnNext = document.getElementById("btn-next");
  const btnShuffle = document.getElementById("btn-shuffle");
  const btnRepeat = document.getElementById("btn-repeat");
  const btnClear = document.getElementById("btn-clear");
  const progressEl = document.getElementById("progress");
  const timeCurEl = document.getElementById("time-cur");
  const timeDurEl = document.getElementById("time-dur");
  const npTitle = document.getElementById("np-title");
  const npSub = document.getElementById("np-sub");
  const playlistEl = document.getElementById("playlist");
  const trackCountEl = document.getElementById("track-count");
  const statusEl = document.getElementById("status-msg");
  const emptyStateHTML = document.getElementById("empty-state").outerHTML;
  const coverImg = document.getElementById("cover-img");
  const coverPlaceholder = document.getElementById("cover-placeholder");
  const coverExpandBtn = document.getElementById("cover-expand");
  const fsOverlay = document.getElementById("fullscreen-cover");
  const fsCoverImg = document.getElementById("fs-cover-img");
  const fsCoverPlaceholder = document.getElementById("fs-cover-placeholder");
  const fsTitle = document.getElementById("fs-title");
  const fsSub = document.getElementById("fs-sub");
  const fsClose = document.getElementById("fs-close");

  let extractQueue = [];
  let extracting = false;

  function setStatus(msg, ms){
    statusEl.textContent = msg;
    if(ms){
      setTimeout(() => { if(statusEl.textContent === msg) statusEl.textContent = ""; }, ms);
    }
  }

  function fmtTime(sec){
    if(!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2, "0");
    return m + ":" + s;
  }

  // ---------- Rendering ----------
  function renderPlaylist(){
    trackCountEl.textContent = tracks.length + (tracks.length === 1 ? " canción" : " canciones");

    if(tracks.length === 0){
      playlistEl.innerHTML = emptyStateHTML;
      return;
    }

    playlistEl.innerHTML = tracks.map((t, i) => `
      <div class="track ${i === currentIndex ? "playing" : ""}" data-index="${i}">
        <div class="idx">${i === currentIndex && isPlaying ? "▶" : (i+1)}</div>
        <div class="meta">
          <div class="name">${escapeHtml(t.name)}</div>
        </div>
        <div class="remove" data-remove="${t.id}">✕</div>
      </div>
    `).join("");
  }

  function escapeHtml(str){
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function updateNowPlaying(){
    if(currentIndex === -1 || !tracks[currentIndex]){
      npTitle.textContent = "Nada en reproducción";
      npTitle.classList.add("empty");
      npSub.textContent = "";
      setCoverDisplay(null);
      return;
    }
    npTitle.classList.remove("empty");
    npTitle.textContent = tracks[currentIndex].name;
    npSub.textContent = (currentIndex + 1) + " de " + tracks.length;
    setCoverDisplay(tracks[currentIndex].coverUrl || null);
  }

  function setCoverDisplay(url){
    if(url){
      coverImg.src = url;
      coverImg.style.display = "block";
      coverPlaceholder.style.display = "none";
    } else {
      coverImg.style.display = "none";
      coverImg.src = "";
      coverPlaceholder.style.display = "flex";
    }
    // keep fullscreen overlay in sync if it's open
    if(fsOverlay.classList.contains("open")){
      openFullscreenCover();
    }
  }

  function openFullscreenCover(){
    const t = tracks[currentIndex];
    if(t && t.coverUrl){
      fsCoverImg.src = t.coverUrl;
      fsCoverImg.style.display = "block";
      fsCoverPlaceholder.style.display = "none";
    } else {
      fsCoverImg.style.display = "none";
      fsCoverPlaceholder.style.display = "block";
    }
    fsTitle.textContent = t ? t.name : "Nada en reproducción";
    fsSub.textContent = t ? (currentIndex + 1) + " de " + tracks.length : "";
    fsOverlay.classList.add("open");
  }

  coverExpandBtn.addEventListener("click", openFullscreenCover);
  coverExpandBtn.setAttribute("ontouchstart", "");
  fsClose.addEventListener("click", () => fsOverlay.classList.remove("open"));
  fsClose.setAttribute("ontouchstart", "");
  fsOverlay.addEventListener("click", (e) => {
    if(e.target === fsOverlay) fsOverlay.classList.remove("open");
  });

  // ---------- Cover extraction (ID3 embedded art) ----------
  function queueCoverExtraction(track, blob){
    extractQueue.push({ track, blob });
    processExtractQueue();
  }

  function processExtractQueue(){
    if(extracting || extractQueue.length === 0) return;
    extracting = true;
    const { track, blob } = extractQueue.shift();

    if(typeof jsmediatags === "undefined"){
      extracting = false;
      return;
    }

    jsmediatags.read(blob, {
      onSuccess: function(tag){
        try {
          const pic = tag.tags && tag.tags.picture;
          if(pic && pic.data && pic.data.length){
            const byteArray = new Uint8Array(pic.data);
            const coverBlob = new Blob([byteArray], { type: pic.format || "image/jpeg" });
            const url = URL.createObjectURL(coverBlob);
            track.coverUrl = url;
            dbUpdateCover(track.id, coverBlob).catch(() => {});
            if(tracks[currentIndex] && tracks[currentIndex].id === track.id){
              setCoverDisplay(url);
            }
            renderPlaylist();
          }
        } catch(err){
          console.warn("No se pudo procesar la portada de", track.name, err);
        }
        extracting = false;
        processExtractQueue();
      },
      onError: function(){
        extracting = false;
        processExtractQueue();
      }
    });
  }

  function updatePlayButton(){
    btnPlay.textContent = isPlaying ? "⏸" : "▶";
  }

  // ---------- Playback ----------
  function buildPlayOrder(){
    playOrder = tracks.map((_, i) => i);
    if(isShuffle){
      for(let i = playOrder.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [playOrder[i], playOrder[j]] = [playOrder[j], playOrder[i]];
      }
    }
  }

  function playTrack(index){
    if(index < 0 || index >= tracks.length) return;
    currentIndex = index;
    const t = tracks[index];
    audioEl.src = t.url;
    audioEl.play().then(() => {
      isPlaying = true;
      updatePlayButton();
      updateNowPlaying();
      renderPlaylist();
    }).catch(err => {
      setStatus("No se pudo reproducir: " + t.name, 3000);
      console.error(err);
    });
  }

  function togglePlay(){
    if(currentIndex === -1){
      if(tracks.length > 0) playTrack(0);
      return;
    }
    if(isPlaying){
      audioEl.pause();
      isPlaying = false;
    } else {
      audioEl.play();
      isPlaying = true;
    }
    updatePlayButton();
    renderPlaylist();
  }

  function nextTrack(auto){
    if(tracks.length === 0) return;
    if(repeatMode === 2 && auto){
      playTrack(currentIndex);
      return;
    }
    let pos = playOrder.indexOf(currentIndex);
    pos = (pos + 1) % playOrder.length;
    if(pos === 0 && auto && repeatMode === 0){
      isPlaying = false;
      updatePlayButton();
      return;
    }
    playTrack(playOrder[pos]);
  }

  function prevTrack(){
    if(tracks.length === 0) return;
    if(audioEl.currentTime > 3){
      audioEl.currentTime = 0;
      return;
    }
    let pos = playOrder.indexOf(currentIndex);
    pos = (pos - 1 + playOrder.length) % playOrder.length;
    playTrack(playOrder[pos]);
  }

  // ---------- Events ----------
  btnAdd.addEventListener("click", () => fileInput.click());
  btnAdd.setAttribute("ontouchstart", "");

  fileInput.addEventListener("change", async (e) => {
    const files = Array.from(e.target.files || []);
    if(files.length === 0) return;
    setStatus("Guardando " + files.length + " archivo(s)...");
    for(const f of files){
      try {
        await dbAddTrack(f.name, f);
      } catch(err){
        console.error("Error guardando", f.name, err);
      }
    }
    setStatus("¡Listo! Música guardada localmente.", 2500);
    await loadTracksFromDB();
    fileInput.value = "";
  });

  btnPlay.addEventListener("click", togglePlay);
  btnNext.addEventListener("click", () => nextTrack(false));
  btnPrev.addEventListener("click", prevTrack);

  btnShuffle.addEventListener("click", () => {
    isShuffle = !isShuffle;
    btnShuffle.classList.toggle("toggled", isShuffle);
    buildPlayOrder();
    setStatus(isShuffle ? "Aleatorio activado" : "Aleatorio desactivado", 1500);
  });

  btnRepeat.addEventListener("click", () => {
    repeatMode = (repeatMode + 1) % 3;
    btnRepeat.classList.toggle("toggled", repeatMode !== 0);
    btnRepeat.textContent = repeatMode === 2 ? "🔂" : "🔁";
    const labels = ["Repetir: desactivado", "Repetir: toda la lista", "Repetir: canción actual"];
    setStatus(labels[repeatMode], 1500);
  });

  btnClear.addEventListener("click", async () => {
    if(tracks.length === 0) return;
    if(!confirm("¿Vaciar toda la música guardada? Esta acción no se puede deshacer.")) return;
    audioEl.pause();
    audioEl.src = "";
    isPlaying = false;
    currentIndex = -1;
    await dbClear();
    await loadTracksFromDB();
    setStatus("Playlist vaciada.", 2000);
  });

  playlistEl.addEventListener("click", (e) => {
    const removeBtn = e.target.closest("[data-remove]");
    if(removeBtn){
      const id = parseInt(removeBtn.getAttribute("data-remove"), 10);
      handleRemove(id);
      return;
    }
    const trackEl = e.target.closest(".track");
    if(trackEl){
      const idx = parseInt(trackEl.getAttribute("data-index"), 10);
      playTrack(idx);
    }
  });

  async function handleRemove(id){
    const wasCurrentPlaying = tracks[currentIndex] && tracks[currentIndex].id === id;
    await dbDelete(id);
    if(wasCurrentPlaying){
      audioEl.pause();
      audioEl.src = "";
      isPlaying = false;
      currentIndex = -1;
    }
    await loadTracksFromDB();
  }

  progressEl.addEventListener("input", () => {
    if(audioEl.duration){
      audioEl.currentTime = (progressEl.value / 100) * audioEl.duration;
    }
  });

  audioEl.addEventListener("timeupdate", () => {
    if(audioEl.duration){
      progressEl.value = (audioEl.currentTime / audioEl.duration) * 100;
      timeCurEl.textContent = fmtTime(audioEl.currentTime);
      timeDurEl.textContent = fmtTime(audioEl.duration);
    }
  });

  audioEl.addEventListener("ended", () => {
    nextTrack(true);
  });

  audioEl.addEventListener("pause", () => {
    if(isPlaying === true && audioEl.currentTime === audioEl.duration){
      // handled by 'ended'
    }
  });

  // ---------- Loading ----------
  async function loadTracksFromDB(){
    const records = await dbGetAll();
    // revoke old urls (audio + cover)
    tracks.forEach(t => {
      if(t.url) URL.revokeObjectURL(t.url);
      if(t.coverUrl) URL.revokeObjectURL(t.coverUrl);
    });
    tracks = records.map(r => ({
      id: r.id,
      name: r.name,
      url: URL.createObjectURL(r.blob),
      coverUrl: r.cover ? URL.createObjectURL(r.cover) : null,
      _rawBlob: r.blob
    }));
    buildPlayOrder();
    renderPlaylist();
    updateNowPlaying();

    // extraer portada para los que aún no la tengan guardada
    tracks.forEach(t => {
      if(!t.coverUrl){
        queueCoverExtraction(t, t._rawBlob);
      }
    });
  }

  async function init(){
    try {
      db = await openDB();
      await loadTracksFromDB();
    } catch(err){
      setStatus("Error al abrir almacenamiento local.", 4000);
      console.error(err);
    }
  }

  // Ensure buttons respond on WebView/touch devices too
  document.querySelectorAll("button").forEach(b => b.setAttribute("ontouchstart", ""));

  init();
})();
</script>
</body>
</html>
